name: Manual Logbook Data Fetcher

on:
  workflow_dispatch: # 仅允许手动触发

# 防止并发的手动运行互相覆盖对方的提交
concurrency:
  group: fetch-data
  cancel-in-progress: false

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write # 仅本工作流所需：提交并推送生成的抓取数据

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run metadata fetch script
        run: node ./scripts/fetch-metadata.js

      - name: Check for changes
        id: changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/content/_generated public/generated
          git commit -m "Auto-update logbook data"
          git push origin ${{ github.ref_name }}
